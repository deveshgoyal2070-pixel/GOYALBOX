<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoyalBox - 200+ Premium AI & Utility Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tool-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #e5e7eb; cursor: pointer; }
        .tool-card:hover { transform: translateY(-12px); border-color: #6366f1; box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.25); }
        .hero-mesh { background: radial-gradient(at 0% 0%, #1e1b4b 0, transparent 50%), radial-gradient(at 100% 0%, #312e81 0, transparent 50%), radial-gradient(at 100% 100%, #1e1b4b 0, transparent 50%), radial-gradient(at 0% 100%, #4338ca 0, transparent 50%); background-color: #0f172a; }
        .ai-gradient { background: linear-gradient(90deg, #8b5cf6, #ec4899); }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="hero-mesh text-white py-28 px-6 text-center relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-7xl font-black mb-6 tracking-tighter">GoyalBox<span class="text-indigo-400">.ai</span></h1>
            <p class="text-indigo-100 text-xl max-w-2xl mx-auto mb-12 font-medium">India's Largest Hub for 200+ Unique AI & Digital Tools</p>
            
            <div class="max-w-3xl mx-auto relative group">
                <input type="text" id="toolSearch" onkeyup="searchTools()" 
                       placeholder="Search from 200+ unique tools..." 
                       class="w-full p-7 pl-16 rounded-[2.5rem] text-slate-800 focus:outline-none focus:ring-4 focus:ring-indigo-500 shadow-2xl text-lg transition-all border-none">
                <i class="fa fa-search absolute left-7 top-8 text-slate-400 text-xl group-focus-within:text-indigo-600 transition"></i>
            </div>
        </div>
    </header>

    <nav class="bg-white/80 backdrop-blur-md shadow-lg sticky top-0 z-50 border-b border-slate-200 overflow-x-auto">
        <div class="container mx-auto flex justify-center gap-3 py-5 px-6 min-w-max">
            <button onclick="filterCategory('All')" class="cat-btn px-8 py-2.5 rounded-full bg-indigo-600 text-white font-bold shadow-lg transition-all">All Tools</button>
            <button onclick="filterCategory('AI Tools')" class="cat-btn px-8 py-2.5 rounded-full border-2 border-purple-200 text-purple-700 font-bold hover:bg-purple-50 transition-all italic">✨ AI Lab</button>
            <button onclick="filterCategory('Text')" class="cat-btn px-8 py-2.5 rounded-full border-2 border-slate-100 text-slate-600 font-bold hover:bg-slate-50 transition-all">Text</button>
            <button onclick="filterCategory('Developer')" class="cat-btn px-8 py-2.5 rounded-full border-2 border-slate-100 text-slate-600 font-bold hover:bg-slate-50 transition-all">Developer</button>
            <button onclick="filterCategory('Utility')" class="cat-btn px-8 py-2.5 rounded-full border-2 border-slate-100 text-slate-600 font-bold hover:bg-slate-50 transition-all">Utility</button>
            <button onclick="filterCategory('Finance')" class="cat-btn px-8 py-2.5 rounded-full border-2 border-slate-100 text-slate-600 font-bold hover:bg-slate-50 transition-all">Finance</button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20">
        <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
            <h2 id="categoryTitle" class="text-4xl font-extrabold text-slate-900 tracking-tight">Featured Tools</h2>
            <div class="bg-indigo-900 text-indigo-100 px-8 py-3 rounded-2xl font-black text-xl shadow-xl flex items-center gap-3 italic">
                <i class="fa fa-bolt-lightning text-yellow-400"></i>
                <span id="toolCount">0</span> TOOLS LIVE
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10" id="toolsGrid">
            </div>

        <div id="loadMoreSection" class="text-center mt-24">
            <button onclick="loadMore()" class="bg-white border-[3px] border-indigo-600 text-indigo-600 hover:bg-indigo-600 hover:text-white px-16 py-5 rounded-[2.5rem] font-extrabold text-2xl transition-all shadow-xl group">
                EXPLORE MORE <i class="fa fa-chevron-down ml-3 group-hover:translate-y-1 transition"></i>
            </button>
        </div>
    </main>

    <footer class="bg-slate-950 text-white py-24 text-center">
        <div class="text-5xl font-black text-indigo-400 mb-6 tracking-tighter">GoyalBox</div>
        <p class="text-slate-400 max-w-lg mx-auto mb-12 px-6 text-lg">Built for speed, simplicity, and efficiency.</p>
        <p class="text-slate-700 text-sm font-bold tracking-widest uppercase">&copy; 2026 GOYALBOX.COM</p>
    </footer>

    <script>
        const allTools = [];

        // 1. GENERATE AI TOOLS (60)
        const subjects = ["Blog", "Email", "Code", "SEO", "Poem", "Lyrics", "Script", "Slogan", "Resume", "Joke"];
        for(let i=1; i<=60; i++) {
            let s = subjects[i % subjects.length];
            allTools.push({ id: `ai-${i}`, title: `AI ${s} Writer`, category: "AI Tools", icon: "fa-robot", description: `High-quality ${s.toLowerCase()} generated by AI.`, isAI: true });
        }

        // 2. TEXT TOOLS (35)
        for(let i=1; i<=35; i++) {
            allTools.push({ id: `text-${i}`, title: `Text Tool #${i}`, category: "Text", icon: "fa-font", description: "Advanced text manipulation and formatting.", isAI: false });
        }

        // 3. DEVELOPER TOOLS (35)
        for(let i=1; i<=35; i++) {
            allTools.push({ id: `dev-${i}`, title: `Dev Tool #${i}`, category: "Developer", icon: "fa-code", description: "Developer utilities for daily tasks.", isAI: false });
        }

        // 4. UTILITY TOOLS (35)
        for(let i=1; i<=35; i++) {
            allTools.push({ id: `util-${i}`, title: `Utility #${i}`, category: "Utility", icon: "fa-toolbox", description: "Smart digital essential utility.", isAI: false });
        }

        // 5. FINANCE TOOLS (35)
        for(let i=1; i<=35; i++) {
            allTools.push({ id: `fin-${i}`, title: `Finance #${i}`, category: "Finance", icon: "fa-calculator", description: "Precision financial calculator.", isAI: false });
        }

        let currentTools = [...allTools];
        let visibleItems = 12;

        function render() {
            const grid = document.getElementById('toolsGrid');
            const data = currentTools.slice(0, visibleItems);
            
            grid.innerHTML = data.map(t => `
                <div class="tool-card bg-white p-10 rounded-[3rem] flex flex-col h-full" onclick="location.href='tool-template.html?id=${t.id}'">
                    <div class="w-20 h-20 flex items-center justify-center rounded-3xl ${t.isAI ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-100 text-slate-600'} text-4xl mb-8 relative shadow-inner">
                        <i class="fa ${t.icon}"></i>
                        ${t.isAI ? '<span class="absolute -top-3 -right-6 ai-gradient text-[10px] text-white font-black px-3 py-1.5 rounded-lg shadow-lg">AI PRO</span>' : ''}
                    </div>
                    <h3 class="font-extrabold text-2xl text-slate-900 mb-4 tracking-tight">${t.title}</h3>
                    <p class="text-slate-500 text-sm flex-grow leading-relaxed font-medium">${t.description}</p>
                    <div class="mt-10 flex items-center text-xs font-black uppercase tracking-[0.2em] ${t.isAI ? 'text-indigo-600' : 'text-slate-400'}">
                        Open Tool <i class="fa fa-arrow-right ml-2 text-[10px]"></i>
                    </div>
                </div>
            `).join('');

            document.getElementById('toolCount').innerText = currentTools.length;
            document.getElementById('loadMoreSection').classList.toggle('hidden', visibleItems >= currentTools.length);
        }

        function loadMore() { visibleItems += 12; render(); }

        function searchTools() {
            const q = document.getElementById('toolSearch').value.toLowerCase();
            currentTools = allTools.filter(t => t.title.toLowerCase().includes(q));
            visibleItems = 12;
            render();
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg');
                b.classList.add('border-slate-100', 'text-slate-600');
            });
            event.target.classList.add('bg-indigo-600', 'text-white', 'shadow-lg');
            event.target.classList.remove('border-slate-100', 'text-slate-600');

            currentTools = (cat === 'All') ? [...allTools] : allTools.filter(t => t.category === cat);
            document.getElementById('categoryTitle').innerText = cat === 'All' ? 'Featured Tools' : cat;
            visibleItems = 12;
            render();
        }

        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoyalBox - 200+ Unique AI & Web Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tool-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .tool-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="gradient-bg text-white py-20 px-6 text-center shadow-2xl">
        <h1 class="text-6xl font-black mb-4 tracking-tighter">GoyalBox</h1>
        <p class="text-blue-100 text-xl max-w-2xl mx-auto mb-10 font-medium">200+ Unique AI, Dev & Utility Tools - 100% Free</p>
        
        <div class="max-w-3xl mx-auto relative">
            <input type="text" id="toolSearch" onkeyup="searchTools()" 
                   placeholder="Search 200+ unique tools..." 
                   class="w-full p-6 pl-16 rounded-3xl text-gray-800 focus:outline-none focus:ring-4 focus:ring-blue-400 shadow-2xl text-lg transition-all">
            <i class="fa fa-search absolute left-6 top-7 text-gray-400 text-xl"></i>
        </div>
    </header>

    <nav class="bg-white shadow-md sticky top-0 z-50 border-b overflow-x-auto">
        <div class="container mx-auto flex justify-center gap-2 py-4 px-6 min-w-max">
            <button onclick="filterCategory('All')" class="cat-btn px-6 py-2 rounded-full bg-blue-600 text-white font-bold transition">All Tools</button>
            <button onclick="filterCategory('AI Tools')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold transition">AI Lab</button>
            <button onclick="filterCategory('Text')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold transition">Text</button>
            <button onclick="filterCategory('Developer')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold transition">Dev Tools</button>
            <button onclick="filterCategory('Utility')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold transition">Utilities</button>
            <button onclick="filterCategory('Finance')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold transition">Finance</button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-10 border-b pb-4">
            <h2 id="currentCategory" class="text-3xl font-black text-gray-800">Featured Tools</h2>
            <span id="toolCountBadge" class="bg-blue-100 text-blue-700 px-4 py-1 rounded-lg font-bold"></span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="toolsGrid">
            </div>

        <div id="loadMoreContainer" class="text-center mt-16 hidden">
            <button onclick="loadMore()" class="bg-white border-2 border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white px-10 py-4 rounded-2xl font-black text-lg transition-all shadow-lg">
                Load More Tools <i class="fa fa-plus ml-2"></i>
            </button>
        </div>
    </main>

    <script>
        // 200 UNIQUE TOOLS DATABASE
        const allTools = [
            // TEXT TOOLS
            { id: "case-converter", title: "Case Converter", category: "Text", icon: "fa-font", description: "UPPER, lower, Sentence case.", isAI: false },
            { id: "word-counter", title: "Word Counter", category: "Text", icon: "fa-calculator", description: "Count words & characters.", isAI: false },
            { id: "text-reverse", title: "Text Reverser", category: "Text", icon: "fa-undo", description: "Flip your text backwards.", isAI: false },
            { id: "lorem-gen", title: "Lorem Ipsum", category: "Text", icon: "fa-paragraph", description: "Dummy text for design.", isAI: false },
            { id: "slug-gen", title: "URL Slug Maker", category: "Text", icon: "fa-link", description: "SEO friendly URL slugs.", isAI: false },
            { id: "remove-spaces", title: "Space Remover", category: "Text", icon: "fa-backspace", description: "Clean extra spaces.", isAI: false },
            { id: "text-to-binary", title: "Text to Binary", category: "Text", icon: "fa-microchip", description: "Convert text to 010101.", isAI: false },
            { id: "binary-to-text", title: "Binary to Text", category: "Text", icon: "fa-file-alt", description: "Decode binary code.", isAI: false },
            
            // AI TOOLS
            { id: "ai-writer", title: "AI Blog Writer", category: "AI Tools", icon: "fa-robot", description: "Write blogs with AI.", isAI: true },
            { id: "ai-story", title: "AI Story Gen", category: "AI Tools", icon: "fa-book", description: "Creative stories by AI.", isAI: true },
            { id: "ai-email", title: "AI Email Draft", category: "AI Tools", icon: "fa-envelope", description: "Professional emails.", isAI: true },
            { id: "ai-poem", title: "AI Poem Maker", category: "AI Tools", icon: "fa-feather", description: "Poetry from prompts.", isAI: true },
            { id: "ai-grammar", title: "AI Grammar Fix", category: "AI Tools", icon: "fa-spell-check", description: "Correct your English.", isAI: true },
            { id: "ai-slogan", title: "AI Slogan Maker", category: "AI Tools", icon: "fa-bullhorn", description: "Catchy brand slogans.", isAI: true },
            
            // DEV TOOLS
            { id: "json-format", title: "JSON Formatter", category: "Developer", icon: "fa-code", description: "Prettify JSON data.", isAI: false },
            { id: "html-min", title: "HTML Minifier", category: "Developer", icon: "fa-file-code", description: "Compress HTML code.", isAI: false },
            { id: "css-min", title: "CSS Minifier", category: "Developer", icon: "fa-paint-brush", description: "Minify CSS files.", isAI: false },
            { id: "js-beautify", title: "JS Beautifier", category: "Developer", icon: "fa-file-js", description: "Clean Javascript.", isAI: false },
            { id: "base64-encode", title: "Base64 Encoder", category: "Developer", icon: "fa-unlock", description: "Text to Base64.", isAI: false },
            
            // FINANCE
            { id: "gst-calc", title: "GST Calculator", category: "Finance", icon: "fa-percent", description: "Calculate Indian GST.", isAI: false },
            { id: "sip-calc", title: "SIP Calculator", category: "Finance", icon: "fa-chart-line", description: "MF returns calculator.", isAI: false },
            { id: "emi-calc", title: "EMI Calculator", category: "Finance", icon: "fa-house", description: "Loan EMI planning.", isAI: false },
            { id: "fd-calc", title: "FD Calculator", category: "Finance", icon: "fa-piggy-bank", description: "Fixed Deposit interest.", isAI: false },
            
            // UTILITIES
            { id: "qr-gen", title: "QR Code Maker", category: "Utility", icon: "fa-qrcode", description: "Create custom QRs.", isAI: false },
            { id: "age-calc", title: "Age Calculator", category: "Utility", icon: "fa-calendar", description: "Find exact age.", isAI: false },
            { id: "wa-link", title: "WA Link Gen", category: "Utility", icon: "fa-whatsapp", description: "Direct chat links.", isAI: false },
            { id: "pass-gen", title: "Password Gen", category: "Utility", icon: "fa-lock", description: "Secure passwords.", isAI: false }
            
            // Note: Maine yahan 25-30 tools dikhaye hain, list ko 200 tak badhane ke liye 
            // isi format mein unique IDs aur titles add karte jao.
        ];

        // 200 UNIQUE TOOLS BANEIN (FOR DEMO)
        // Bhai, kyunki message limit hoti hai, maine 20 tools list kiye hain. 
        // Baaki 180 ko main unique IDs dekar fill kar raha hoon taaki aap site dekh sako.
        for(let i=1; i<=180; i++) {
            allTools.push({
                id: `unique-tool-${i}`,
                title: `Premium Tool ${i+20}`,
                category: i % 2 === 0 ? "Utility" : "Developer",
                icon: "fa-toolbox",
                description: `A unique utility tool for your daily needs. Tool number ${i+20}.`,
                isAI: false
            });
        }

        let currentFilteredTools = [...allTools];
        let itemsToShow = 12;

        function displayTools() {
            const grid = document.getElementById('toolsGrid');
            const loadMoreBtn = document.getElementById('loadMoreContainer');
            const toolsToRender = currentFilteredTools.slice(0, itemsToShow);
            
            grid.innerHTML = toolsToRender.map(tool => `
                <div class="tool-card bg-white p-8 rounded-[2rem] flex flex-col h-full cursor-pointer" onclick="location.href='tools/${tool.id}.html'">
                    <div class="w-16 h-16 flex items-center justify-center rounded-2xl ${tool.isAI ? 'bg-purple-100 text-purple-600' : 'bg-blue-50 text-blue-600'} text-3xl mb-6 shadow-inner">
                        <i class="fa ${tool.icon}"></i>
                    </div>
                    <h3 class="font-black text-xl text-gray-800 mb-3">${tool.title}</h3>
                    <p class="text-gray-500 text-sm flex-grow leading-relaxed">${tool.description}</p>
                    <div class="mt-8 flex items-center text-xs font-black uppercase tracking-widest ${tool.isAI ? 'text-purple-600' : 'text-blue-600'}">
                        Open Tool <i class="fa fa-arrow-right ml-2"></i>
                    </div>
                </div>
            `).join('');

            loadMoreBtn.classList.toggle('hidden', itemsToShow >= currentFilteredTools.length);
            document.getElementById('toolCountBadge').innerText = `${currentFilteredTools.length} Tools`;
        }

        function loadMore() {
            itemsToShow += 12;
            displayTools();
        }

        function searchTools() {
            const query = document.getElementById('toolSearch').value.toLowerCase();
            currentFilteredTools = allTools.filter(t => t.title.toLowerCase().includes(query) || t.description.toLowerCase().includes(query));
            itemsToShow = 12;
            displayTools();
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('hover:bg-blue-50', 'text-gray-600');
            });
            event.target.classList.add('bg-blue-600', 'text-white');

            currentFilteredTools = (cat === 'All') ? [...allTools] : allTools.filter(t => t.category === cat);
            document.getElementById('currentCategory').innerText = cat;
            itemsToShow = 12;
            displayTools();
        }

        displayTools();
    </script>
</body>
</html>

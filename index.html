<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoyalBox - 500+ Free AI & Web Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tool-card { transition: all 0.3s ease; border: 1px solid #f3f4f6; }
        .tool-card:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .gradient-brand { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="gradient-brand text-white py-20 px-6 text-center shadow-2xl">
        <h1 class="text-6xl font-extrabold mb-4 tracking-tight">GoyalBox</h1>
        <p class="text-blue-100 text-xl max-w-2xl mx-auto mb-10">Duniya ke 500+ behtareen AI aur Utility Tools - Sab kuch Free!</p>
        
        <div class="max-w-3xl mx-auto relative">
            <input type="text" id="toolSearch" onkeyup="searchTools()" 
                   placeholder="Search from 500+ tools (e.g. AI Writer, GST, YouTube)..." 
                   class="w-full p-6 pl-16 rounded-3xl text-gray-800 focus:outline-none focus:ring-4 focus:ring-blue-400 shadow-2xl text-lg">
            <i class="fa fa-search absolute left-6 top-7 text-gray-400 text-xl"></i>
        </div>
    </header>

    <nav class="bg-white shadow-md sticky top-0 z-50 border-b overflow-x-auto">
        <div class="container mx-auto flex justify-center gap-3 py-4 px-6">
            <button onclick="filterCategory('All')" class="cat-btn px-6 py-2 rounded-full bg-blue-600 text-white font-bold">All Tools</button>
            <button onclick="filterCategory('AI')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold">AI Lab</button>
            <button onclick="filterCategory('Text')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold">Text</button>
            <button onclick="filterCategory('Developer')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold">Dev Tools</button>
            <button onclick="filterCategory('Finance')" class="cat-btn px-6 py-2 rounded-full hover:bg-blue-50 text-gray-600 font-semibold">Finance</button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-10 border-b pb-6">
            <h2 id="currentCategory" class="text-4xl font-black text-gray-800">Explore Tools</h2>
            <div class="bg-blue-600 text-white px-6 py-2 rounded-2xl font-black text-lg shadow-lg">
                <span id="toolCount">0</span> Tools
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="toolsGrid">
            </div>

        <div id="loadMoreSection" class="text-center mt-20">
            <button onclick="loadMore()" class="bg-white border-4 border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white px-12 py-5 rounded-3xl font-black text-xl transition-all shadow-xl">
                Load More Tools <i class="fa fa-arrow-down ml-2"></i>
            </button>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-12 text-center mt-20">
        <p class="text-2xl font-black text-blue-400 mb-4">GoyalBox.com</p>
        <p class="text-gray-500">&copy; 2026 All Tools in One Place.</p>
    </footer>

    <script>
        // 1. BASE TOOLS LIST (Inhe use karke hum 500 banayenge)
        const baseTools = [
            { title: "AI Writer", cat: "AI", icon: "fa-robot", desc: "AI se content likhwayein." },
            { title: "Case Converter", cat: "Text", icon: "fa-font", desc: "Text case change karein." },
            { title: "GST Calc", cat: "Finance", icon: "fa-percent", desc: "GST calculation tool." },
            { title: "JSON Fixer", cat: "Developer", icon: "fa-code", desc: "JSON clean karein." },
            { title: "QR Maker", cat: "Utility", icon: "fa-qrcode", desc: "Instant QR codes." },
            { title: "Word Counter", cat: "Text", icon: "fa-calculator", desc: "Ginti karein words ki." },
            { title: "AI Image Gen", cat: "AI", icon: "fa-magic", desc: "Text to image converter." },
            { title: "SIP Calc", cat: "Finance", icon: "fa-chart-line", desc: "Returns check karein." },
            { title: "HTML Minifier", cat: "Developer", icon: "fa-file-code", desc: "Code compress karein." },
            { title: "WA Link", cat: "Utility", icon: "fa-whatsapp", desc: "Chat links banayein." },
            { title: "YT Thumbnail", cat: "Utility", icon: "fa-youtube", desc: "Download thumbnails." },
            { title: "Age Calc", cat: "Utility", icon: "fa-calendar", desc: "Check your exact age." },
            { title: "Password Gen", cat: "Security", icon: "fa-lock", desc: "Strong passwords." },
            { title: "Unit Conv", cat: "Utility", icon: "fa-ruler", desc: "Metric conversions." },
            { title: "AI Code Fix", cat: "AI", icon: "fa-terminal", desc: "Fix bugs with AI." }
        ];

        // 2. AUTO-GENERATE 500 TOOLS
        let allTools = [];
        function generate500() {
            for (let i = 1; i <= 500; i++) {
                let base = baseTools[i % baseTools.length];
                allTools.push({
                    id: `tool-${i}`,
                    title: `${base.title} #${i}`,
                    category: base.cat,
                    icon: base.icon,
                    description: base.desc,
                    isAI: base.cat === 'AI'
                });
            }
        }
        generate500();

        let filteredTools = [...allTools];
        let visibleCount = 20;

        function render() {
            const grid = document.getElementById('toolsGrid');
            const data = filteredTools.slice(0, visibleCount);
            
            grid.innerHTML = data.map(t => `
                <div class="tool-card bg-white p-8 rounded-[2.5rem] flex flex-col h-full cursor-pointer" onclick="alert('Opening: ${t.title}')">
                    <div class="w-16 h-16 flex items-center justify-center rounded-2xl ${t.isAI ? 'bg-purple-100 text-purple-600' : 'bg-blue-50 text-blue-600'} text-3xl mb-6 shadow-inner">
                        <i class="fa ${t.icon}"></i>
                    </div>
                    <h3 class="font-bold text-xl text-gray-800 mb-2">${t.title}</h3>
                    <p class="text-gray-500 text-sm flex-grow">${t.description}</p>
                    <div class="mt-6 text-xs font-black uppercase tracking-widest ${t.isAI ? 'text-purple-600' : 'text-blue-600'}">
                        Launch Tool <i class="fa fa-chevron-right ml-1"></i>
                    </div>
                </div>
            `).join('');

            document.getElementById('toolCount').innerText = filteredTools.length;
            document.getElementById('loadMoreSection').style.display = (visibleCount >= filteredTools.length) ? 'none' : 'block';
        }

        function loadMore() {
            visibleCount += 20;
            render();
        }

        function searchTools() {
            const q = document.getElementById('toolSearch').value.toLowerCase();
            filteredTools = allTools.filter(t => t.title.toLowerCase().includes(q));
            visibleCount = 20;
            render();
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-white'));
            // Styling logic simplified for example
            filteredTools = (cat === 'All') ? allTools : allTools.filter(t => t.category === cat);
            visibleCount = 20;
            render();
        }

        render();
    </script>
</body>
</html>
